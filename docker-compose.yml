services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: linkedinsi
      POSTGRES_PASSWORD: linkedinsi
      POSTGRES_DB: linkedinsi
    volumes:
      - postgres_data:/var/lib/postgresql/data

  linkedin-mcp:
    image: stickerdaniel/linkedin-mcp-server:latest
    restart: unless-stopped
    ports:
      - "8765:8000"
    volumes:
      - ~/.linkedin-mcp:/home/pwuser/.linkedin-mcp
    environment:
      - LOG_LEVEL=WARNING
    command: ["--transport", "streamable-http", "--host", "0.0.0.0", "--port", "8000"]

  whatsapp-service:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      - whatsapp_sessions:/data/whatsapp-sessions
    environment:
      - WHATSAPP_SERVICE_PORT=3002
      - WHATSAPP_SESSIONS_DIR=/data/whatsapp-sessions

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - whatsapp-service
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - WHATSAPP_SERVICE_URL=http://whatsapp-service:3002
      - DATABASE_URL=postgresql://linkedinsi:linkedinsi@postgres:5432/linkedinsi
      # Remaining vars loaded from .env (or override via Coolify environment config):
      # NEXTAUTH_SECRET, NEXTAUTH_URL, GOOGLE_CLIENT_ID,
      # GOOGLE_CLIENT_SECRET, INNGEST_EVENT_KEY, INNGEST_SIGNING_KEY,
      # APOLLO_API_KEY, LINKEDIN_COOKIE_ENC_KEY, RESEND_API_KEY
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  whatsapp_sessions:
